<!doctype html>
<!-- photo-roulette-birthday — Idée de Valentin Dusservaix et Aurélien Moote en support - 2026 — Licence MIT -->
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0014" />
  <title>🎬 Diffusion — Photo Roulette</title>
  <link rel="stylesheet" href="/static/display.css" />
</head>
<body>
  <div id="stage" class="stage">
    <div id="waiting" class="waiting">
      <h1>Photo Roulette 🎉</h1>
      <p>En attente des premières photos…<br>Scannez le QR code et balancez vos plus beaux clichés 📸</p>
    </div>
  </div>

  <div class="hud">
    <span id="badge" class="badge"></span>
    <span id="status-dot" class="dot" title="connexion"></span>
  </div>

  <!-- QR pour rejoindre en scannant l'écran -->
  <div class="join" id="join">
    <img id="join-qr" src="/static/qr.png" alt="" onerror="this.style.display='none'" />
    <div class="join-text">📸 Scanne pour<br>envoyer tes photos !</div>
  </div>

  <!-- Ballon collaboratif -->
  <div class="balloon-wrap" id="balloon-wrap">
    <div class="balloon" id="balloon">🎈</div>
    <div class="balloon-label" id="balloon-label"></div>
  </div>

  <script src="/static/display.js"></script>
</body>
</html>
